<div style="padding: 20px; font-family: Arial, sans-serif;">
  <h1>Angular Basics Demo App</h1>
  
  <div style="border: 1px solid #ccc; padding: 15px; margin-bottom: 20px;">
    <h3>Data Binding Demonstration (Parent Component)</h3>
    
    <!-- 1. Two-way Binding: Syncs input value with component property -->
    <div>
      <label>Enter Student Name: </label>
      <input 
        type="text" 
        [(ngModel)]="studentNameInput" 
        (ngModelChange)="onInputChange()"
        placeholder="Type a name..."
      >
      <!-- Interpolation: Displays the current input dynamically -->
      <p><em>Typing (Interpolation): {{ studentNameInput }}</em></p>
    </div>

    <!-- 2. Event Binding: Calls confirmStudent() when clicked -->
    <!-- 3. Property Binding: Binds the 'disabled' attribute to a boolean property -->
    <button 
      (click)="confirmStudent()" 
      [disabled]="isButtonDisabled"
      style="margin-top: 10px;"
    >
      Confirm Student
    </button>
  </div>

  <!-- Display message received from child component operations -->
  <div *ngIf="childMessage" style="margin-bottom: 20px; color: #d9534f; font-weight: bold;">
    Message from Child: {{ childMessage }}
  </div>

  <!-- Empty State Handling with *ngIf -->
  <div *ngIf="studentList.length === 0" style="padding: 20px; background-color: #f8f9fa; text-align: center; border-radius: 8px;">
    <p style="color: #6c757d;">No students registered yet. Add a student above.</p>
  </div>

  <!-- Child Component Integration with *ngFor -->
  <div *ngIf="studentList.length > 0">
    <h4>Registered Students List</h4>
    
    <!-- *ngFor loop iterates over the student array -->
    <div *ngFor="let student of studentList; let i = index" style="margin-bottom: 10px;">
      <!-- 
        - Property binding [studentData] and [studentIndex] passes data to child (@Input)
        - Event binding (removeEvent) listens to child (@Output)
      -->
      <app-student-card 
        [studentData]="student" 
        [studentIndex]="i"
        (removeEvent)="handleRemoveStudent($event)">
      </app-student-card>
    </div>
  </div>

</div>
